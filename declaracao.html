<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❤️Declaração❤️</title>
    <link rel="icon" type="image/png" href="coracao.png?v=2">
    <style>
        body {
            background: linear-gradient(135deg,#ff758c,#ff7eb3);
            color: white;
            margin: 0;
            padding-bottom: 50px;
            font-family: Arial, sans-serif;
        }
        .container {
            width: 95%;
            max-width: 420px; 
            padding: 15px;
            margin: 0 auto;
            text-align: center;
            padding-top: 30px;
        }
        h1 { font-size: 1.3rem; line-height: 1.5; margin-bottom: 25px; }
        
        .foto-container { position: relative; display: inline-block; }
        
        .foto-principal {
            width: 220px;
            height: 220px;
            object-fit: cover;
            border-radius: 20%;
            border: 6px solid white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            padding: 5px;
            background: white;
            transition: transform 0.3s;
        }

        .foto-container::before, .foto-container::after {
            content: "❤️";
            position: absolute;
            font-size: 35px;
            animation: pulse 2s infinite;
            z-index: 1;
        }
        .foto-container::before { top: -15px; left: -15px; }
        .foto-container::after { bottom: -15px; right: -15px; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }

        /* AJUSTE NA GALERIA PARA CELULAR */
        .galeria {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .galeria img, .video-romantico {
            width: 100%;
            max-width: 280px; /* Tamanho padrão para tudo */
            height: auto;
            border-radius: 15px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.4);
            transition: transform 0.3s;
        }
        
        .heart {
            position: fixed;
            top: -10px;
            color: red;
            font-size: 20px;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            Eu só queria que você soubesse que nesses 2 anos de relacionamento,
            me tornei o Homem mais feliz por ter você em minha vida ❤️
        </h1>

        <div class="foto-container">
            <img src="img2.png" class="foto-principal">
        </div>

        <h2 style="font-size: 1.1rem; margin-top: 20px;">
            Você é perfeita do jeito que é, e eu te amo exatamente por isso ❤️
        </h2>
        
        <h2 class="mt-5">Nossos Momentos ❤️</h2>

        <div class="galeria">
            <img src="img3.webp">
            <p>❤️❤️❤️❤️❤️❤️❤️❤️</p>
            <img src="img4.png">
            <p>❤️❤️❤️❤️❤️❤️❤️❤️</p>
            
            <video class="video-romantico" autoplay loop muted playsinline>
                <source src="video1.mp4" type="video/mp4">
            </video>
            <p>❤️❤️❤️❤️❤️❤️❤️❤️</p>
            
            <video class="video-romantico" autoplay loop muted playsinline>
                <source src="video2.mp4" type="video/mp4">
            </video>
        </div>

        <h3 class="mt-4">Te amo muito! ❤️</h3>
    </div>

    <audio id="musica" loop>
        <source src="Dizeres.mp3" type="audio/mpeg">
    </audio>

    <script>
       // Sistema de corações caindo (mantido)
function criarCoracao(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random()*100 + "vw";
    heart.style.animationDuration = (Math.random()*3+3)+"s";
    document.body.appendChild(heart);
    setTimeout(()=>{ heart.remove(); },5000);
}
setInterval(criarCoracao, 300);

const musica = document.getElementById("musica");

const tempoSalvo = localStorage.getItem("tempoMusica");

if (tempoSalvo) {
    musica.currentTime = parseFloat(tempoSalvo); 
}

musica.play().catch(() => {
    console.log("Aguardando interação para soltar o som...");
});

document.addEventListener("click", () => {
    if (musica.paused) {
        musica.play();
    }
}, { once: true });

setInterval(() => {
    localStorage.setItem("tempoMusica", musica.currentTime);
}, 1000);
    </script>
</body>
</html>
