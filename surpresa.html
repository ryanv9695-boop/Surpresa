<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surpresa</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>

body{
 background: linear-gradient(135deg,#ff9a9e,#fad0c4);
display:flex;
justify-content:center;
font-family:Arial, Helvetica, sans-serif;
}

.container{
    width:100%;
    max-width:420px;
    text-align:center;
    padding:20px;
}
h1{
font-size:28px;
margin-top:20px;
}
p{
    font-size: 18px;
}
.foto-principal{
width:100%;
height:260px;
height: auto;
object-fit:cover;
border-radius:20px;
border:6px solid white;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
margin:20px auto;
display:block;
}

.heart{
position:fixed;
top:-10px;
font-size:20px;
animation:fall linear infinite;
}

@keyframes fall{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(100vh);
opacity:0;
}
}
.botao-amor{
background:#ff4d6d;
border:none;
color:white;
padding:15px 30px;
font-size:18px;
border-radius:30px;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
transition:all 0.3s;
animation:pulsar 2s infinite;
}

.botao-amor:hover{
transform:scale(1.1);
background:#ff1e4d;
}

@keyframes pulsar{
0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}
}

.explosao{
position:fixed;
font-size:30px;
pointer-events:none;
animation:explodir 1s forwards;
}

@keyframes explodir{
0%{
transform:scale(0) translate(0,0);
opacity:1;
}
100%{
transform:scale(1.5) translate(var(--x),var(--y));
opacity:0;
}
}

</style>
</head>

<body>
    <div class="container">

        <audio id="musica" autoplay loop>
    <source src="Dizeres.mp3" type="audio/mpeg"></audio>

    <h1> oi minha princesa ❤️</h1>

    <h3>Eu preparei algo que vc talvez goste</h3>

    <img src="img.webp" class="foto-principal">

    <h2>Você faz meus dias melhores❤️</h2>

    <h3>Tenho algo para te dizer 🤭</h3>

        <button class="botao-amor" onclick="explodir()">Mata sua curiosidade😂</button>

    </div>

    <script>

function criarCoracao(){

const heart = document.createElement("div");

heart.classList.add("heart");

heart.innerHTML = "❤️";

heart.style.left = Math.random()*100 + "vw";

heart.style.animationDuration = (Math.random()*3+3)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);

}

setInterval(criarCoracao,300);

function explodir(){

for(let i=0;i<100;i++){

const coracao = document.createElement("div");

coracao.classList.add("explosao");

coracao.innerHTML="❤️";

coracao.style.left="50%";
coracao.style.top="50%";

coracao.style.setProperty("--x",(Math.random()*400-200)+"px");
coracao.style.setProperty("--y",(Math.random()*400-200)+"px");

document.body.appendChild(coracao);

setTimeout(()=>{
coracao.remove();
},1000);

}

setTimeout(()=>{
window.location.href="declaração.html";
},1200);

}
const musica = document.getElementById("musica");

document.addEventListener("click", () => {
musica.muted = false;
musica.play();
});

</script>
</body>
</html>
